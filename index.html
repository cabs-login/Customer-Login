<!DOCTYPE html>
<html lang="en">
<head>
    <meta property="og:title" content="Farm Management System">

<meta property="og:description"
content="Worker Registration and Daily Task Submission">

<meta property="og:image"
content="https://your-domain.vercel.app/banner.png">

<meta property="og:url"
content="https://your-domain.vercel.app">

<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farm Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

    #loadingScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loader-box{
    text-align:center;
    color:white;
}

.spinner{
    width:60px;
    height:60px;
    border:6px solid rgba(255,255,255,.3);
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 20px;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}


body{
    height:100vh;
    background:url("banner.png") center center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
}

.container{
    position:relative;
    width:90%;
    max-width:420px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    color:white;
    text-align:center;
    z-index:2;
}

.logo{
    font-size:55px;
    margin-bottom:10px;
}

h1{
    font-size:28px;
    margin-bottom:8px;
}

p{
    margin-bottom:25px;
    color:#eee;
}

.input-group{
    margin-bottom:18px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2e7d32;
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1b5e20;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#ddd;
}

</style>

</head>
<body>

<div class="overlay"></div>

<div class="container">

<div class="logo">🌾</div>

<h1>Farm Management System</h1>

<p>Worker Registration</p>

<div class="input-group">
<input
type="text"
id="name"
placeholder="Enter First Name">
</div>

<div class="input-group">
<input
type="number"
id="age"
placeholder="Enter Age">
</div>

<button onclick="startWork()">
Start Work
</button>

<div class="footer">
Powered by Farm Management
</div>

</div>

<script>

function startWork() {

    const name = document.getElementById("name").value.trim();
    const age = document.getElementById("age").value.trim();

    if(name === "" || age === ""){
        alert("Please enter your First Name and Age.");
        return;
    }

    document.getElementById("loadingScreen").style.display = "flex";

fetch("https://script.google.com/macros/s/AKfycbx-64c46hZuP4Rq_aivIlJ79QG7PfLmWtkIY4h1_nCdI3KZlwQbIS7rkNg3RZfxUmLS/exec", {
    method: "POST",
    body: JSON.stringify({
        date: new Date().toLocaleDateString("en-GB"),
        name: name,
        age: age
    })
})
.then(response => {
    if (!response.ok) {
        throw new Error("Server error");
    }

    return response.text();
})
.then(data => {
    console.log(data);

    localStorage.setItem("workerName", name);
    localStorage.setItem("workerAge", age);

    window.location.href = "code.html";
})
.catch(err => {
    console.error(err);
    document.getElementById("loadingScreen").style.display = "none";
    alert("Failed to submit worker details.");
});

}

</script>
<div id="loadingScreen" style="display:none;">
    <div class="loader-box">
        <div class="spinner"></div>
        <h3>Please wait...</h3>
        <p>Verifying worker details</p>
    </div>
</div>
</body>
</html>
